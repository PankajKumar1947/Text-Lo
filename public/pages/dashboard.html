<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — TextLo</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/auth.css">
  <link rel="stylesheet" href="/css/dashboard.css">
</head>

<body>
  <a href="/start" class="back-home">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
    Back to Home
  </a>

  <div class="dashboard-container">
    <div class="dashboard-card">
      <div class="dashboard-header">
        <div class="dashboard-avatar">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
        <div class="dashboard-info">
          <h2 id="userEmail">Loading...</h2>
          <p id="userPlan">Plan: Free</p>
        </div>
      </div>

      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-value" id="storeCount">-</div>
          <div class="stat-label">Total Stores</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="collabCount">-</div>
          <div class="stat-label">Collaborations</div>
        </div>
      </div>

      <button id="logoutBtn" class="btn btn-outline logout-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Logout
      </button>
    </div>
  </div>

  <script type="module" src="/js/dashboard.js"></script>
</body>

</html>
